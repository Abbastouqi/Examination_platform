# Reverse proxy: TLS termination + routing frontend (Next.js) and API (FastAPI).
# Place real certs in deploy/certs/ (fullchain.pem, privkey.pem) or use Certbot.

upstream frontend_upstream { server frontend:3000; }
upstream backend_upstream  { server backend:8000; }

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name your-domain.pk www.your-domain.pk api.your-domain.pk;
    return 301 https://$host$request_uri;
}

# Frontend (app)
server {
    listen 443 ssl;
    server_name your-domain.pk www.your-domain.pk;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 60m;   # allow PDF uploads proxied to the API if same host

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API
server {
    listen 443 ssl;
    server_name api.your-domain.pk;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    client_max_body_size 60m;

    location / {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (chat streaming): disable buffering, keep alive.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}
